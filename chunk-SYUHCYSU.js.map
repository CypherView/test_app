<app-theme>
  <div class="wrapper bg-cover bg-center h-screen">
    <app-network-animation></app-network-animation>
    <div class="auth-shell flex flex-col items-center justify-center h-full">
      @if (logoPath() && !logoError()) {
        <img
          class="logo-filter mb-10 max-w-[40%] max-h-24 object-contain hidden sm:block"
          [src]="logoPath()"
          (error)="onLogoError()"
          alt="logo"
        />
      }
      <router-outlet></router-outlet>
    </div>
  </div>
</app-theme>
