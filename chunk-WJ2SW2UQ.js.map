<div class="flex flex-col h-full w-full overflow-hidden">
  <!-- Header -->
  <div class="flex-none border-b border-subtle px-6 pt-6 pb-0">
    <div class="flex justify-between items-center mb-4">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">More Apps</h1>
        <p class="mt-1">
          Discover and manage custom integrations for your workspace.
        </p>
      </div>
      <a routerLink="/app-store/docs">
        <p-button
          label="Integration Docs"
          icon="pi pi-book"
          severity="secondary"
          [outlined]="true"
          size="small"
        />
      </a>
    </div>
  </div>

  <!-- Tabs and Content -->
  <app-dynamic-tab-panel
    [tabs]="tabs()"
    baseRoute="/app-store"
    [contentScrollable]="true"
  />
</div>

<!-- Content Template (used by dynamic-tab-panel) -->
<ng-template #contentTemplate>
  <router-outlet></router-outlet>
</ng-template>
