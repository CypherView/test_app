<!-- If contentOnly is true, don't use p-dialog -->
@if (contentOnly()) {
  <div class="wizard-content">
    <app-stepper
      [steps]="steps()"
      [currentStepValue]="currentStep"
      [linearProgression]="linearProgression()"
      [showNavButtons]="!useWizardButtonsOnly()"
      [showSteps]="showSteps()"
      (stepChange)="onStepChange($event)"
      (complete)="onStepComplete()"
    >
    </app-stepper>
  </div>
  <!-- Footer buttons without dialog -->
  @if (showFooterButtons()) {
    <div class="flex justify-end gap-2 w-full mt-3">
      <p-button
        label="Cancel"
        icon="pi pi-times"
        severity="secondary"
        (onClick)="cancelWizard()"
      ></p-button>
      @if (!isFirstStep()) {
        <p-button
          label="Back"
          icon="pi pi-arrow-left"
          severity="secondary"
          (onClick)="goBack()"
        ></p-button>
      }
      @if (!isLastStep()) {
        <p-button
          label="Next"
          icon="pi pi-arrow-right"
          iconPos="right"
          [disabled]="!canGoNext()"
          (onClick)="goNext()"
        ></p-button>
      }
      @if (isLastStep()) {
        <p-button
          label="Finish"
          icon="pi pi-check"
          severity="primary"
          [disabled]="!canFinish()"
          (onClick)="onComplete()"
        ></p-button>
      }
    </div>
  }
} @else {
  <p-dialog
    [visible]="visible()"
    [header]="header()"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [closeOnEscape]="closeOnEscape()"
    (onHide)="hideDialog()"
    (visibleChange)="hideDialog()"
    styleClass="wizard-dialog"
  >
    <!-- Existing dialog content -->
    <div class="wizard-content">
      <app-stepper
        [steps]="steps()"
        [currentStepValue]="currentStep"
        [linearProgression]="linearProgression()"
        [showNavButtons]="!useWizardButtonsOnly()"
        [showSteps]="showSteps()"
        (stepChange)="onStepChange($event)"
        (complete)="onStepComplete()"
      >
      </app-stepper>
    </div>
    <ng-template pTemplate="footer">
      <!-- Existing footer buttons -->
      @if (showFooterButtons()) {
        <div class="flex justify-end gap-2 w-full">
          <p-button
            label="Cancel"
            icon="pi pi-times"
            severity="secondary"
            (onClick)="cancelWizard()"
          ></p-button>
          @if (!isFirstStep()) {
            <p-button
              label="Back"
              icon="pi pi-arrow-left"
              severity="secondary"
              (onClick)="goBack()"
            ></p-button>
          }
          @if (!isLastStep()) {
            <p-button
              label="Next"
              icon="pi pi-arrow-right"
              iconPos="right"
              [disabled]="!canGoNext()"
              (onClick)="goNext()"
            ></p-button>
          }
          @if (isLastStep()) {
            <p-button
              label="Finish"
              icon="pi pi-check"
              severity="primary"
              [disabled]="!canFinish()"
              (onClick)="onComplete()"
            ></p-button>
          }
        </div>
      }
    </ng-template>
  </p-dialog>
}
