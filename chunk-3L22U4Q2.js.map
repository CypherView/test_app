<div class="flex items-center gap-2">
  <!-- Selected Icon Display -->
  <div class="flex items-center gap-2 flex-1">
    @if (value()) {
      @if (selectedEntry()?.type === 'svg') {
        <!-- eslint-disable-next-line @angular-eslint/template/no-inline-styles -->
        <span
          class="w-8 h-8 inline-block bg-current"
          [style.mask]="'url(' + selectedEntry()!.path + ') center/contain no-repeat'"
          [style.-webkit-mask]="'url(' + selectedEntry()!.path + ') center/contain no-repeat'"
          [attr.aria-label]="'Selected icon: ' + value()"
        ></span>
      } @else {
        <span
          class="material-icons-outlined text-2xl"
          [attr.aria-label]="'Selected icon: ' + value()"
        >
          {{ value() }}
        </span>
      }
      <span class="text-sm text-gray-600">{{ value() }}</span>
    } @else {
      <span class="text-sm text-gray-500">No icon selected</span>
    }
  </div>

  <!-- Select Button -->
  <p-button
    label="Select Icon"
    icon="pi pi-search"
    [outlined]="true"
    size="small"
    (onClick)="showDialog()"
    [attr.aria-label]="'Open icon selector dialog'"
  />

  <!-- Clear Button -->
  @if (value()) {
    <p-button
      icon="pi pi-times"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="clearSelection()"
      [attr.aria-label]="'Clear selected icon'"
    />
  }
</div>

<!-- Icon Selection Dialog -->
<p-dialog
  [(visible)]="dialogVisible"
  header="Select Icon"
  [modal]="true"
  styleClass="icon-selector-dialog"
  [dismissableMask]="true"
>
  <div class="flex flex-col h-full">
    <!-- Search Input -->
    <div class="my-4">
      <p-iconfield>
        <input
          pInputText
          [ngModel]="searchTerm()"
          (ngModelChange)="searchTerm.set($event)"
          placeholder="Search icons..."
          class="w-full"
          [attr.aria-label]="'Search for icons'"
        />
        <p-inputicon class="pi pi-search" />
      </p-iconfield>
    </div>

    <!-- Icons Grid -->
    <p-scrollPanel styleClass="icon-grid-scroll">
      <div class="grid grid-cols-6 sm:grid-cols-8 md:grid-cols-10 gap-3 p-2">
        @for (entry of filteredIcons(); track entry.name) {
          <button
            type="button"
            class="flex flex-col items-center p-3 border rounded cursor-pointer hover:bg-primary transition-colors icon-item focus:outline-none focus:ring-2 focus:ring-primary"
            [class.selected]="entry.name === value()"
            (click)="selectIcon(entry.name)"
            [attr.aria-label]="'Select ' + entry.name + ' icon'"
          >
            @if (entry.type === 'svg') {
              <!-- eslint-disable-next-line @angular-eslint/template/no-inline-styles -->
              <span
                class="w-8 h-8 mb-1 inline-block bg-current"
                [style.mask]="'url(' + entry.path + ') center/contain no-repeat'"
                [style.-webkit-mask]="'url(' + entry.path + ') center/contain no-repeat'"
                [attr.aria-label]="entry.name"
              ></span>
            } @else {
              <span class="material-icons-outlined text-2xl mb-1">{{ entry.name }}</span>
            }
            <span class="text-xs text-center break-all">{{ entry.name }}</span>
          </button>
        }
      </div>

      @if (filteredIcons().length === 0) {
        <div class="text-center p-8 text-gray-500 search-no-results">
          <span class="pi pi-search text-4xl mb-4 block"></span>
          <p>No icons found matching "{{ searchTerm() }}"</p>
        </div>
      }
    </p-scrollPanel>
  </div>
</p-dialog>
