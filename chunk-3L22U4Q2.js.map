<div class="filter-header">
  <!-- Actor Selection - Only show if there are actor nodes or if actor is required -->
  @if (actorNodes().length > 0 || requireActorBeforeAction()) {
    <span class="filter-text">When </span>
    <div class="mr-2 selector-wrapper">
      <span
        class="cursor-pointer underlined-field"
        (click)="openActorDropdown($event)"
        (keydown.enter)="openActorDropdown($event)"
      >
        {{ actor()?.data?.['text'] || 'actor' }}
      </span>
      <p-treeselect
        #actorTreeSelect
        [options]="actorNodes()"
        [filter]="true"
        [filterInputAutoFocus]="true"
        [(ngModel)]="actor"
        placeholder="Select Actor"
        [showClear]="true"
        appendTo="body"
        class="treeselect-anchor tree-select-background"
        styleClass="min-w-[200px]"
      ></p-treeselect>
    </div>
  }

  <!-- Action Selection -->
  <div class="selector-wrapper">
    <span
      class="cursor-pointer underlined-field"
      [class.disabled-text]="
        !actor() && requireActorBeforeAction() && actorNodes().length > 0
      "
      (click)="openActionDropdown($event)"
      (keydown.enter)="openActionDropdown($event)"
    >
      {{ action()?.data?.['text'] || 'action' }}
    </span>
    <p-treeselect
      #actionTreeSelect
      [options]="actionNodes()"
      [(ngModel)]="action"
      placeholder="Select Action"
      optionLabel="name"
      [showClear]="true"
      appendTo="body"
      class="treeselect-anchor"
      styleClass="min-w-[200px] bg-(--p-tree-background)"
    ></p-treeselect>
  </div>
</div>
