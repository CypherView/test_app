<p-accordion value="information">
  <p-accordion-panel value="information">
    <p-accordion-header>
      <span class="uppercase">Information</span>
    </p-accordion-header>

    <p-accordion-content>
      <app-distributor-details [entity]="distributor()" />
      <p-divider />
      <app-customize-distributor [entity]="distributor()" />
      <p-divider />
      <app-distributor-address [entity]="distributor()" />
      <p-divider />
      <app-distributor-ssl-certificates
        [entity]="distributor()"
      /> </p-accordion-content
  ></p-accordion-panel>

  <p-accordion-panel value="settings">
    <p-accordion-header>
      <span class="uppercase">Settings</span>
    </p-accordion-header>

    <p-accordion-content>
      <app-distributor-settings [entity]="distributor()" />
      <p-divider />
      <app-distributor-notification-settings [entity]="distributor()" />
      <p-divider />
      <app-distributor-external-authentication [entity]="distributor()" />
    </p-accordion-content>
  </p-accordion-panel>

  <p-accordion-panel value="statistics">
    <p-accordion-header>
      <span class="uppercase">Statistics</span>
    </p-accordion-header>

    <p-accordion-content> </p-accordion-content> </p-accordion-panel
></p-accordion>
