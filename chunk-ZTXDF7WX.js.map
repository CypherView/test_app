<div class="modal-list-form-content p-fluid p-3">
  @if (_subHeader) {
    <p class="mb-4">
      {{ _subHeader }}
    </p>
  }
  <app-dynamic-form
    [fields]="_fields"
    [hideActions]="true"
    (formReady)="handleFormReady($event)"
  >
  </app-dynamic-form>
</div>

<!-- Footer with Action Buttons -->
<div
  class="modal-list-form-footer flex justify-end gap-2 p-3 border-t border-surface-border"
>
  @for (action of _actions; track trackByLabel($index, action)) {
    @if (isVisible(action)) {
      <p-button
        [label]="action.label"
        [icon]="action.icon"
        [styleClass]="action.styleClass"
        [severity]="action.severity"
        [disabled]="isDisabled(action)"
        (onClick)="handleAction(action)"
      ></p-button>
    }
  }
</div>
