<div class="conflict-overlay">
  <div
    class="conflict-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="conflict-title"
  >
    <h3 id="conflict-title" class="conflict-title">
      {{ 'DEVELOPMENT.ANALYTICAL_REPORT.CONFLICT_MODAL.TITLE' | translate }}
    </h3>
    <p class="conflict-message">
      {{ 'DEVELOPMENT.ANALYTICAL_REPORT.CONFLICT_MODAL.MESSAGE' | translate }}
    </p>
    <div class="conflict-actions">
      <button class="btn btn-secondary" (click)="reload.emit()">
        {{ 'DEVELOPMENT.ANALYTICAL_REPORT.CONFLICT_MODAL.RELOAD' | translate }}
      </button>
      <button class="btn btn-primary" (click)="overwrite.emit()">
        {{
          'DEVELOPMENT.ANALYTICAL_REPORT.CONFLICT_MODAL.OVERWRITE' | translate
        }}
      </button>
    </div>
  </div>
</div>
