<div
  class="block-edit-popover"
  role="dialog"
  [attr.aria-label]="
    'DEVELOPMENT.ANALYTICAL_REPORT.EDIT_FRAME.ARIA.ASK_AI_TITLE' | translate
  "
>
  <textarea
    #promptInput
    class="bep-input"
    rows="2"
    [attr.placeholder]="
      'DEVELOPMENT.ANALYTICAL_REPORT.EDIT_POPOVER.PLACEHOLDER' | translate
    "
    [value]="prompt()"
    [disabled]="isSending()"
    (input)="prompt.set(promptInput.value)"
    (keydown.enter)="onEnter($event)"
    (keydown.escape)="cancel()"
  ></textarea>

  @if (error()) {
    <p class="bep-error">{{ error() }}</p>
  }

  <div class="bep-actions">
    <button
      type="button"
      class="bep-btn bep-cancel"
      (click)="cancel()"
      [disabled]="isSending()"
    >
      {{ 'SHARED.COMMON.BUTTONS.CANCEL' | translate }}
    </button>
    <button
      type="button"
      class="bep-btn bep-send"
      (click)="submit()"
      [disabled]="isSending() || prompt().trim().length === 0"
    >
      {{ isSending() ? 'Applying…' : 'Send' }}
    </button>
  </div>
</div>
