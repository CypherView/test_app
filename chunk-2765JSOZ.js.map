<div class="flex flex-col gap-3">
  <div class="flex gap-2 items-center">
    <i class="pi pi-filter text-surface-500"></i>
    <span class="font-semibold text-surface-700">{{
      'DEVELOPMENT.ANALYTICAL_REPORT.FILTERS.IDLING.TITLE' | translate
    }}</span>
  </div>

  <!-- Duration threshold (minutes). Blank = show all. -->
  <div class="flex items-center gap-2">
    <span class="text-[0.8125rem] text-surface-600 min-w-[5.5rem]">{{
      'DEVELOPMENT.ANALYTICAL_REPORT.FILTERS.SHARED.DURATION_LABEL' | translate
    }}</span>
    <input
      type="number"
      min="0"
      step="any"
      [attr.placeholder]="
        'DEVELOPMENT.ANALYTICAL_REPORT.FILTERS.SHARED.SHOW_ALL_PLACEHOLDER'
          | translate
      "
      class="w-28 px-2 py-1.5 text-xs rounded-lg border border-surface-300 bg-surface-0 text-surface-700 focus:outline-none focus:border-primary transition-colors duration-150"
      [ngModel]="minDurationMinutes()"
      (ngModelChange)="setDuration($any($event) ?? '')"
    />
  </div>

  <span class="text-[0.75rem] text-surface-500">
    {{
      'DEVELOPMENT.ANALYTICAL_REPORT.FILTERS.SHARED.EVENT_THRESHOLD_HELP'
        | translate
    }}
  </span>
</div>
