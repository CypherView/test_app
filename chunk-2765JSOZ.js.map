<div class="flex flex-col gap-3">
  <div class="flex gap-2 items-center">
    <i class="pi pi-filter text-surface-500"></i>
    <span class="font-semibold text-surface-700">{{
      'DEVELOPMENT.ANALYTICAL_REPORT.FILTERS.ALERT.TITLE' | translate
    }}</span>
  </div>

  <!-- Mode picker -->
  <p-select
    [options]="modeOptions"
    optionLabel="label"
    optionValue="value"
    [ngModel]="mode()"
    (ngModelChange)="mode.set($event)"
    [placeholder]="
      'DEVELOPMENT.ANALYTICAL_REPORT.FILTERS.ALERT.SELECT_SCOPE_PLACEHOLDER'
        | translate
    "
    styleClass="w-full"
    [size]="'small'"
    appendTo="body"
  />

  <!-- Specific Alerts — multi-select of alert categories -->
  @if (showCategoryMulti()) {
    <p-multi-select
      [options]="categoryOptions"
      optionLabel="label"
      optionValue="value"
      [ngModel]="selectedCategories()"
      (ngModelChange)="selectedCategories.set($event)"
      display="chip"
      [filter]="true"
      [placeholder]="
        'DEVELOPMENT.ANALYTICAL_REPORT.FILTERS.ALERT.PICK_ALERTS_PLACEHOLDER'
          | translate
      "
      styleClass="w-full"
      [size]="'small'"
      appendTo="body"
    />
  }
</div>
