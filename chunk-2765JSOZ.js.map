<div class="flex flex-col gap-3">
  <div class="flex gap-2 items-center">
    <i class="pi pi-filter text-surface-500"></i>
    <span class="font-semibold text-surface-700">Event Type Filter</span>
  </div>

  <!-- Mode picker -->
  <p-select
    [options]="modeOptions"
    optionLabel="label"
    optionValue="value"
    [ngModel]="mode()"
    (ngModelChange)="mode.set($event)"
    placeholder="Select filter scope"
    styleClass="w-full"
    [size]="'small'"
    appendTo="body"
  />

  <!-- Specific Event Types — multi-select of event categories -->
  @if (showCategoryMulti()) {
    <p-multi-select
      [options]="categoryOptions"
      optionLabel="label"
      optionValue="value"
      [ngModel]="selectedCategories()"
      (ngModelChange)="selectedCategories.set($event)"
      display="chip"
      [filter]="true"
      placeholder="Pick one or more event types"
      styleClass="w-full"
      [size]="'small'"
      appendTo="body"
    />
  }
</div>
