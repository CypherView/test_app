<div class="flex flex-col gap-3">
  <div class="flex gap-2 items-center">
    <i class="pi pi-filter text-surface-500"></i>
    <span class="font-semibold text-surface-700">Geofence Filter</span>
  </div>

  <!-- Mode picker -->
  <p-select
    [options]="modeOptions"
    optionLabel="label"
    optionValue="value"
    [ngModel]="mode()"
    (ngModelChange)="mode.set($event)"
    placeholder="Select filter scope"
    styleClass="w-full"
    [size]="'small'"
    appendTo="body"
  />

  <!-- Specific Geofence Type — multi-select of zone types -->
  @if (showTypeMulti()) {
    <p-multi-select
      [options]="zoneTypeOptions"
      optionLabel="label"
      optionValue="value"
      [ngModel]="selectedTypes()"
      (ngModelChange)="selectedTypes.set($event)"
      display="chip"
      placeholder="Pick one or more geofence types"
      styleClass="w-full"
      [size]="'small'"
      appendTo="body"
    />
  }

  <!-- Specific Geofence Group — multi-select from API -->
  @if (showGroupMulti()) {
    <p-multi-select
      [options]="zoneGroupOptions()"
      optionLabel="label"
      optionValue="value"
      [ngModel]="selectedGroups()"
      (ngModelChange)="selectedGroups.set($event)"
      display="chip"
      [filter]="true"
      [placeholder]="
        isLoadingGroups()
          ? 'Loading groups…'
          : 'Pick one or more geofence groups'
      "
      [loading]="isLoadingGroups()"
      styleClass="w-full"
      [size]="'small'"
      appendTo="body"
    />
  }

  <!-- All Geofences in Type — single-select type -->
  @if (showTypeSingle()) {
    <p-select
      [options]="zoneTypeOptions"
      optionLabel="label"
      optionValue="value"
      [ngModel]="selectedTypeForAllIn()"
      (ngModelChange)="selectedTypeForAllIn.set($event)"
      placeholder="Pick a geofence type"
      styleClass="w-full"
      [size]="'small'"
      appendTo="body"
    />
  }

  <!-- Specific Geofence — multi-select from API -->
  @if (showZoneMulti()) {
    <p-multi-select
      [options]="zoneOptions()"
      optionLabel="label"
      optionValue="value"
      [ngModel]="selectedZones()"
      (ngModelChange)="selectedZones.set($event)"
      display="chip"
      [filter]="true"
      [placeholder]="
        isLoadingZones() ? 'Loading geofences…' : 'Pick one or more geofences'
      "
      [loading]="isLoadingZones()"
      styleClass="w-full"
      [size]="'small'"
      appendTo="body"
    />
  }
</div>
