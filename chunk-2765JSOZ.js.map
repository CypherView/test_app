<div
  class="flex flex-col gap-3 p-3 rounded-xl border border-default shadow-sm bg-contentBg"
>
  <!-- Header with Actions -->
  <div class="flex items-center justify-between gap-2">
    <span class="text-sm font-semibold text-color"
      >Select data to analyze:</span
    >
    <div class="flex gap-1.5">
      @if (!allSelected()) {
        <button
          type="button"
          class="px-2.5 py-1 text-xs font-medium bg-transparent border border-default rounded text-color cursor-pointer hover:bg-hover transition-colors duration-150"
          (click)="selectAll()"
        >
          Select All
        </button>
      } @else {
        <button
          type="button"
          class="px-2.5 py-1 text-xs font-medium bg-transparent border border-default rounded text-color cursor-pointer hover:bg-hover transition-colors duration-150"
          (click)="clearAll()"
        >
          Clear All
        </button>
      }
    </div>
  </div>

  <!-- Data Type Cards -->
  <div class="grid grid-cols-2 gap-2 max-[400px]:grid-cols-1">
    @for (type of dataTypes(); track type.id) {
      <button
        type="button"
        class="relative flex flex-col items-start gap-1 p-3 rounded-lg border-2 text-left cursor-pointer transition-all duration-150"
        [ngClass]="
          isSelected(type.id)
            ? 'bg-primary/10 border-primary'
            : 'bg-contentBg border-default hover:bg-hover hover:border-primary/50'
        "
        (click)="toggleDataType(type)"
      >
        <div class="absolute top-2 right-2">
          <input
            type="checkbox"
            class="w-3.5 h-3.5 cursor-pointer accent-primary"
            [checked]="isSelected(type.id)"
            (click)="$event.stopPropagation()"
            (change)="toggleDataType(type)"
          />
        </div>
        <i class="pi {{ type.icon }} text-xl mb-1 text-primary"></i>
        <span
          class="text-[0.8125rem] font-semibold"
          [ngClass]="isSelected(type.id) ? 'text-primary' : 'text-color'"
          >{{ type.label }}</span
        >
        <span class="text-[0.6875rem] leading-snug text-color-secondary">{{
          type.description
        }}</span>
      </button>
    }
  </div>

  <!-- Selection Summary & Confirm -->
  <div
    class="flex items-center justify-between gap-3 px-3 py-2 rounded border bg-primary/10 border-primary"
  >
    <div
      class="flex items-center gap-2 text-[0.8125rem] font-medium text-primary"
    >
      <i class="pi pi-database"></i>
      @if (canConfirm()) {
        <span
          >{{ selectedCount() }} data type{{
            selectedCount() === 1 ? '' : 's'
          }}
          selected</span
        >
      } @else {
        <span>Select data types to analyze</span>
      }
    </div>
    <p-button
      label="Confirm Selection"
      icon="pi pi-check"
      [disabled]="!canConfirm()"
      (onClick)="onConfirm()"
      size="small"
    />
  </div>
</div>
