<div
  class="flex items-center justify-between p-4 bg-blue-600 dark:bg-blue-800 rounded-xl shadow-lg border border-blue-500/50"
>
  <div class="flex items-center gap-4">
    <div class="bg-white/20 p-2 rounded-lg backdrop-blur-sm">
      <i class="pi pi-info-circle text-xl"></i>
    </div>
    <div>
      <div
        class="text-[10px] font-black uppercase tracking-widest opacity-80 decoration-white/30 underline underline-offset-4 mb-0.5"
      >
        QA Simulation Active
      </div>
      <div class="flex items-center gap-2">
        <span class="font-bold text-sm tracking-tight">Browsing as:</span>
        <span
          class="px-2 py-0.5 bg-white text-blue-700 text-xs font-black rounded uppercase shadow-sm"
        >
          {{ activeProfileName() }}
        </span>
      </div>
    </div>
  </div>

  <div class="flex gap-2">
    <p-button
      label="Save"
      icon="pi pi-save"
      severity="success"
      (onClick)="save.emit()"
      [loading]="isSaving()"
      size="small"
    ></p-button>
    <p-button
      label="Reset"
      icon="pi pi-refresh"
      severity="secondary"
      (onClick)="resetPermissions.emit()"
      size="small"
    ></p-button>
  </div>
</div>
