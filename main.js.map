<span
  (click)="onToggle()"
  class="block p-2 w-full text-nav-client-font-color"
  [ngClass]="{
    'text-right': !isCollapsed(),
    'text-center': isCollapsed(),
  }"
>
  <i
    class="pi"
    [ngClass]="{
      'pi-chevron-left': !isCollapsed(),
      'pi-chevron-right': isCollapsed(),
    }"
  ></i>
</span>
