<app-theme>
  <div class="flex h-full">
    <app-sidebar></app-sidebar>

    <div class="w-full">
      <!-- QA Test Mode Banner -->
      @if (qaTools.testMode()) {
        <div
          class="qa-test-banner flex items-center justify-between px-4 py-2 bg-orange-500 text-white border-b-2 border-orange-600"
        >
          <div class="flex items-center gap-2">
            <i class="pi pi-exclamation-triangle"></i>
            <span class="font-semibold">QA TEST MODE ACTIVE</span>
            <span class="text-sm opacity-90">
              Simulating: {{ qaTools.activeProfileName() }}
            </span>
          </div>
          <div class="flex items-center gap-2">
            <button
              class="px-3 py-1 text-sm bg-white text-orange-600 rounded hover:bg-orange-50 transition-colors"
              (click)="openQAPanel()"
            >
              <i class="pi pi-cog mr-1"></i>
              Manage
            </button>
            <button
              class="px-3 py-1 text-sm bg-orange-700 text-white rounded hover:bg-orange-800 transition-colors"
              (click)="qaTools.resetQAState()"
            >
              <i class="pi pi-refresh mr-1"></i>
              Reset
            </button>
          </div>
        </div>
      }

      <p-scrollpanel [ngClass]="scrollPanelClass()">
        <!-- Flutter Layer -->
        <div
          [ngClass]="{ hidden: !isFlutterRoute(), block: isFlutterRoute() }"
          class="h-full flutter-layout"
        >
          @defer {
            <app-flutter-layout />
          } @placeholder (minimum 500ms) {
            <p-progressSpinner styleClass="w-[50px] h-[50px]" strokeWidth="4">
            </p-progressSpinner>
          } @loading (after 100ms; minimum 1s) {
            <p-progressSpinner styleClass="w-[50px] h-[50px]" strokeWidth="4">
            </p-progressSpinner>
          }
        </div>

        <!-- Iframe Layer for External Links -->
        <div
          [ngClass]="{ hidden: !isIframeRoute(), block: isIframeRoute() }"
          class="h-full"
        >
          @if (iframeUrl()) {
            <iframe
              [src]="iframeUrl()"
              title="External Application"
              class="w-full h-full border-0"
              sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
            ></iframe>
          }
        </div>

        <!-- Angular Layer -->
        <div
          [ngClass]="{
            hidden: isFlutterRoute() || isIframeRoute(),
            block: !isFlutterRoute() && !isIframeRoute(),
          }"
          class="h-full"
        >
          <router-outlet />
        </div>
      </p-scrollpanel>
    </div>
  </div>
</app-theme>
