<div
  class="qa-permission-tester flex flex-col gap-4 p-4 border rounded-xl shadow-2xl bg-white dark:bg-gray-900 overflow-hidden h-full"
>
  <!-- Header with Close Icon -->
  <div
    class="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700"
  >
    <div class="flex items-center gap-3">
      <div class="p-2 bg-primary/10 rounded-lg">
        <i class="pi pi-shield text-primary text-xl"></i>
      </div>
      <div>
        <h2 class="text-xl font-bold leading-tight">QA Permission Center</h2>
        <p class="text-xs text-gray-500 font-medium">
          Verify frontend simulation and backend enforcement
        </p>
      </div>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto px-4 pb-4">
    <p-tabs [(value)]="activeTabIndex">
      <!-- MAIN TABS -->
      <p-tablist>
        <p-tab [value]="0">
          <i class="pi pi-desktop mr-2"></i>
          Simulation
        </p-tab>
        <p-tab [value]="1">
          <i class="pi pi-shield mr-2"></i>
          API Verification
        </p-tab>
      </p-tablist>

      <p-tabpanels>
        <!-- Simulation Tab -->
        <p-tabpanel [value]="0">
          <app-qa-simulation-tab
            [testMode]="qaTools.activePersona() !== null"
            [activeProfileName]="
              qaTools.activePersona()?.name || 'Standard User'
            "
            [isSaving]="isSaving()"
            [roles]="qaTools.availableRoles()"
            [togglePermissions]="togglePermissions()"
            [checkPermission]="
              permissionService.canAccess.bind(permissionService)
            "
            [clientStats]="clientStats()"
            [vendorStats]="vendorStats()"
            [distributorStats]="distributorStats()"
            [canViewContext]="canViewContext.bind(this)"
            [clientFeatureAccess]="clientFeatureAccess()"
            [vendorFeatureAccess]="vendorFeatureAccess()"
            [distributorFeatureAccess]="distributorFeatureAccess()"
            [(selectedProfileId)]="selectedProfileId"
            (saveRequested)="saveToRole()"
            (resetRequested)="resetPermissions()"
            (applyProfileRequested)="applyProfile()"
            (togglePermissionRequested)="
              togglePermission($any($event).permission, $any($event).enabled)
            "
          ></app-qa-simulation-tab>
        </p-tabpanel>

        <!-- API Verification Tab -->
        <p-tabpanel [value]="1">
          <app-qa-api-verification-tab></app-qa-api-verification-tab>
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </div>

  <div
    class="p-3 bg-gray-50 dark:bg-gray-800 border-t border-gray-100 dark:border-gray-700 flex justify-center"
  >
    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">
      CypherView QA Internal Infrastructure v2.1
    </p>
  </div>
</div>
