<p-dialog
  header="Select Client"
  [visible]="display()"
  (visibleChange)="display.set($event)"
  (onHide)="closeDialog()"
  [modal]="true"
  [maximizable]="false"
  styleClass="w-[90vw] max-w-[800px]"
  [contentStyleClass]="'max-h-[70vh] overflow-visible p-6'"
>
  <app-client-selection-form
    [clients]="clients()"
    [loading]="loading()"
    [useServerSearch]="useServerSearch()"
    [totalRecords]="totalRecords()"
    [enablePagination]="useServerSearch()"
    [enableLazyLoad]="useServerSearch()"
    [recentClients]="recentClients()"
    (clientSelected)="selectClient($event)"
    (searchQuery)="onClientSearch($event)"
    (lazyLoad)="onLazyLoadClients($event)"
  ></app-client-selection-form>
</p-dialog>
