<p-card styleClass="border shadow-sm">
  <div class="flex flex-col gap-4">
    <div class="flex items-center justify-between">
      <h3 class="font-bold text-gray-800 dark:text-gray-200">
        Persona Selection
      </h3>
      <div class="flex items-center gap-2">
        <span
          class="text-[10px] p-1 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 rounded font-bold uppercase tracking-widest"
        >
          {{ roles().length }} Roles Available
        </span>
      </div>
    </div>

    <div class="flex flex-col gap-3">
      <div class="p-select-wrapper">
        <p-select
          [options]="roles()"
          [(ngModel)]="selectedProfileId"
          optionLabel="name"
          optionValue="id"
          placeholder="Choose a Persona to Simulate"
          styleClass="w-full"
          (onChange)="apply.emit()"
        >
          <ng-template pTemplate="selectedItem" let-selectedOption>
            @if (selectedOption) {
              <div class="flex items-center gap-3">
                <div
                  class="w-2 h-2 rounded-full bg-primary animate-pulse"
                ></div>
                <span class="font-bold text-sm">{{ selectedOption.name }}</span>
              </div>
            }
          </ng-template>
          <ng-template pTemplate="item" let-role>
            <div class="flex flex-col py-1">
              <span
                class="font-bold text-sm text-gray-800 dark:text-gray-200"
                >{{ role.name }}</span
              >
              <span class="text-[10px] text-gray-400 font-mono">{{
                role.id
              }}</span>
            </div>
          </ng-template>
        </p-select>
      </div>

      <div
        class="flex items-center justify-between p-3 rounded-lg bg-gray-50 dark:bg-gray-900 border border-gray-100 dark:border-gray-800/50"
      >
        <div class="flex flex-col">
          <span
            class="text-[10px] font-black uppercase tracking-tighter text-gray-400"
            >Current Context</span
          >
          <span class="text-xs font-bold text-gray-700 dark:text-gray-300">
            {{
              selectedProfileId()
                ? 'Simulated Persona'
                : 'Real System Permissions'
            }}
          </span>
        </div>
        <div
          class="w-8 h-8 rounded-full bg-white dark:bg-gray-800 flex items-center justify-center border shadow-sm"
        >
          <i
            [class]="
              selectedProfileId()
                ? 'pi pi-user text-primary'
                : 'pi pi-shield text-gray-400'
            "
          ></i>
        </div>
      </div>
    </div>
  </div>
</p-card>
