<div class="flex flex-col gap-6 pt-4">
  <!-- Active Profile Banner -->
  @if (testMode()) {
    <app-qa-test-mode-banner
      [activeProfileName]="activeProfileName()"
      [isSaving]="isSaving()"
      (save)="saveRequested.emit()"
      (resetPermissions)="resetRequested.emit()"
    ></app-qa-test-mode-banner>
  }

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Left Column: Persona & Access -->
    <div class="flex flex-col gap-6">
      <app-qa-persona-selector
        [roles]="roles()"
        [(selectedProfileId)]="selectedProfileId"
        (apply)="applyProfileRequested.emit()"
      ></app-qa-persona-selector>

      <app-qa-feature-access-stats
        [clientStats]="clientStats()"
        [vendorStats]="vendorStats()"
        [distributorStats]="distributorStats()"
        [canViewContext]="canViewContext()"
      ></app-qa-feature-access-stats>
    </div>

    <!-- Right Column: Granular Controls -->
    <app-qa-permission-toggles
      [permissions]="togglePermissions()"
      [checkPermission]="checkPermission()"
      (togglePermission)="togglePermissionRequested.emit($event)"
    ></app-qa-permission-toggles>
  </div>

  <!-- Feature Access Tables Per Tier -->
  @if (canViewContext()('client') && clientFeatureAccess().length > 0) {
    <app-qa-feature-access-table
      [rows]="clientFeatureAccess()"
      context="Client"
    ></app-qa-feature-access-table>
  }

  @if (canViewContext()('vendor') && vendorFeatureAccess().length > 0) {
    <app-qa-feature-access-table
      [rows]="vendorFeatureAccess()"
      context="Vendor"
    ></app-qa-feature-access-table>
  }

  @if (
    canViewContext()('distributor') && distributorFeatureAccess().length > 0
  ) {
    <app-qa-feature-access-table
      [rows]="distributorFeatureAccess()"
      context="Distributor"
    ></app-qa-feature-access-table>
  }
</div>
