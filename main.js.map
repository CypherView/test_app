<p-card styleClass="border shadow-sm">
  <div class="flex flex-col gap-3">
    <div class="flex items-center justify-between">
      <h3 class="font-bold text-gray-800 dark:text-gray-200">
        Granular Toggles
      </h3>
      <span
        class="text-[10px] p-1 bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 rounded font-bold uppercase tracking-widest"
      >
        {{ permissions().length }} Available
      </span>
    </div>
    <div
      class="max-h-60 overflow-y-auto pr-2 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2"
    >
      @for (permission of permissions(); track permission) {
        <div
          class="flex items-center gap-3 p-2 rounded-lg border border-transparent hover:border-gray-100 dark:hover:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors group"
        >
          <input
            type="checkbox"
            [id]="'perm-' + permission"
            class="w-4 h-4 rounded text-primary focus:ring-primary border-gray-300 cursor-pointer"
            [checked]="checkPermission()(permission)"
            (change)="
              togglePermission.emit({
                permission,
                enabled: $any($event.target).checked,
              })
            "
          />
          <label
            [for]="'perm-' + permission"
            class="text-xs font-medium text-gray-700 dark:text-gray-300 cursor-pointer flex-1 truncate"
            [pTooltip]="permission"
            tooltipPosition="top"
          >
            {{ permission }}
          </label>
        </div>
      }
    </div>
  </div>
</p-card>
