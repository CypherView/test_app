<!-- details-accordion-container.component.html -->
<div class="p-3 bg-surface-card rounded-md shadow-sm h-full overflow-auto">
  <p-accordion
    [value]="accordionValue()"
    (valueChange)="onAccordionChange($event)"
    multiple="true"
  >
    <!-- Loop through all section types -->
    @for (sectionType of sectionTypes(); track sectionType.key) {
      @if (hasSections(sectionType.key)) {
        <p-accordion-panel [value]="sectionType.key">
          <p-accordion-header>
            <span class="uppercase">{{ sectionType.label }}</span>
          </p-accordion-header>
          <p-accordion-content>
            @for (
              section of getSections(sectionType.key);
              track section.id;
              let last = $last
            ) {
              <ng-container
                *ngComponentOutlet="
                  section.component;
                  inputs: getSectionInputs(section)
                "
              ></ng-container>
              @if (!last) {
                <p-divider />
              }
            }
          </p-accordion-content>
        </p-accordion-panel>
      }
    }
  </p-accordion>
</div>
