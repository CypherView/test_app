<div class="google-maps-zone-container">
  <div class="map-container">
    <app-google-map
      #map
      [class]="'h-[400px] w-full'"
      [center]="center()"
      (polygonChanged)="onPolygonChanged($event)"
    >
    </app-google-map>
  </div>

  @if (errorMessage) {
    <div class="error-message mt-2 p-2 bg-red-100 text-red-700 rounded">
      {{ errorMessage }}
    </div>
  }

</div>
