<div class="pt-2 card">
  <div class="flex justify-start items-center p-2 mb-4">
    <span
      class="pi pi-database !text-[2.5rem]"
      [attr.aria-label]="'ADMIN.DEVICES.TYPES.CACHED.ARIA.ICON' | translate"
    ></span>

    <div class="flex-1 pl-6">
      <div class="flex justify-between items-center">
        <h2 class="m-0 text-xl font-semibold">
          {{ 'ADMIN.DEVICES.TYPES.CACHED.SECTION_TITLE' | translate }}
        </h2>
        @if (!isFormEditable() && !createMode()) {
          <div class="icon-light">
            <span
              class="pi pi-pen-to-square action hover !text-2xl"
              [attr.aria-label]="
                'ADMIN.DEVICES.TYPES.CACHED.ARIA.EDIT' | translate
              "
              (click)="onEdit()"
              (keydown.enter)="onEdit()"
            ></span>
          </div>
        }
      </div>
      <span>{{
        'ADMIN.DEVICES.TYPES.CACHED.SECTION_DESCRIPTION' | translate
      }}</span>
    </div>
  </div>

  @if (isFormEditable()) {
    <!-- Dynamic Form for edit mode only -->
    <app-dynamic-form
      [fields]="formFields"
      [actions]="actions"
      (formValueChange)="onFormValueChange($event)"
      (formValidityChange)="onFormValidityChange($event)"
    >
    </app-dynamic-form>
  }

  @if (!isFormEditable() && !createMode()) {
    <div class="cached-fields-container">
      <app-grid
        [data]="cachedFieldsDisplay()"
        [columns]="columns"
        [showGridLines]="false"
        [hideHeader]="true"
        tableStyleClass="info-display !w-auto"
      ></app-grid>
    </div>
  }
</div>
