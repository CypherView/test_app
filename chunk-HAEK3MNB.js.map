<div class="card pt-2">
  <div class="mb-4 p-2 flex justify-start items-center">
    <span
      class="pi pi-wave-pulse !text-[2.5rem]"
      [ngClass]="{ 'icon-primary': isFormEditable() }"
      [attr.aria-label]="
        'ADMIN.ASSETS.ANALOG_TRIGGERS.ARIA.ASSET_ANALOG_TRIGGER_ICON'
          | translate: { icon: 'wave-pulse' }
      "
    ></span>

    <div class="pl-6 flex-1">
      <div class="flex justify-between items-center">
        <h2 class="text-xl font-semibold m-0">
          {{ 'ADMIN.ASSETS.ANALOG_TRIGGERS.TITLE' | translate }}
        </h2>
        @if (!isFormEditable()) {
          <div class="icon-light">
            <span
              class="pi pi-pen-to-square action hover !text-2xl"
              [attr.aria-label]="
                'ADMIN.ASSETS.ANALOG_TRIGGERS.ARIA.EDIT_ASSET_ANALOG_TRIGGER_ICON'
                  | translate
              "
              (click)="onEdit()"
              (keydown.enter)="onEdit()"
            ></span>
          </div>
        }
      </div>
      <span>{{ 'ADMIN.ASSETS.ANALOG_TRIGGERS.DESCRIPTION' | translate }}</span>
    </div>
  </div>

  <!-- Edit Mode -->
  @if (isFormEditable()) {
    <app-dynamic-form
      [fields]="formFields"
      [actions]="actions"
      (formSubmit)="onSubmit($event)"
      (formValueChange)="onFormValueChange($event)"
      (formValidityChange)="onFormValidityChange($event)"
    >
    </app-dynamic-form>
  }
  <!-- View Mode -->
  @else {
    <app-grid
      [data]="assetAnalogAndTemperatureTriggersList()"
      [columns]="columns"
      [showGridLines]="false"
      [hideHeader]="true"
      tableStyleClass="info-display !w-auto"
    ></app-grid>
  }
</div>
