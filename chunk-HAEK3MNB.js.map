@if (!isInitialLoading() && !error()) {
  @if (isBulkMode() && selectedEntities().length > 0) {
    <app-details-accordion-container
      [sections]="sections()"
      [entity]="null"
      [title]="selectedEntities().length + ' Devices'"
      subtitle="Device"
      [allowModeToggle]="true"
      [isBulkMode]="true"
      (entityChange)="onEntityChange($event)"
    ></app-details-accordion-container>
  } @else if (fullDevice()) {
    <app-details-accordion-container
      [sections]="sections()"
      [entity]="fullDevice()"
      [title]="fullDevice()?.name || 'Device Details'"
      subtitle="Device"
      [allowModeToggle]="true"
      [isBulkMode]="isBulkMode()"
      (entityChange)="onEntityChange($event)"
      initialMode="view"
    ></app-details-accordion-container>
  } @else {
    <div class="p-4">
      <p-message
        severity="info"
        text="No device details available."
      ></p-message>
    </div>
  }
}
