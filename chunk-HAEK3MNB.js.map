@if (!isInitialLoading() && !error()) {
  @if (fullVendor()) {
    <app-details-accordion-container
      [sections]="flexibleConfiguration().sections"
      [layout]="flexibleConfiguration().layout"
      [entity]="fullVendor()"
      [title]="
        fullVendor()?.name || ('ADMIN.VENDORS.DETAILS.TITLE' | translate)
      "
      [allowModeToggle]="true"
      (entityChange)="onEntityChange($event)"
      initialMode="view"
    ></app-details-accordion-container>
  } @else {
    <div class="p-4">
      <p-message severity="info">
        {{
          'SHARED.COMMON.SELECTION.NO_ITEMS'
            | translate
              : {
                  type: ('ADMIN.ENTITIES.VENDOR' | translate),
                }
        }}
      </p-message>
    </div>
  }
}
