@if (!isInitialLoading() && !error()) {
  @if (fullCostCentre()) {
    <app-details-accordion-container
      [sections]="sections()"
      [entity]="fullCostCentre()"
      [title]="
        fullCostCentre()?.name ||
        ('ADMIN.COST_CENTRES.DETAILS.TITLE' | translate)
      "
      [allowModeToggle]="true"
      (entityChange)="onEntityChange($event)"
      initialMode="view"
    ></app-details-accordion-container>
  } @else {
    <div class="p-4">
      <p-message severity="info"
        >{{
          'SHARED.COMMON.SELECTION.NO_ITEMS'
            | translate
              : {
                  type: ('ADMIN.ENTITIES.COST_CENTRE' | translate),
                }
        }}"
      </p-message>
    </div>
  }
}
