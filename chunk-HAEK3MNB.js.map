@if (isInitialLoading()) {
  <p-progressSpinner />
} @else if (error()) {
  <p-message severity="error" [text]="error()!" />
} @else {
  @if (fullContact()) {
    <app-details-accordion-container
      [sections]="sections()"
      [entity]="fullContact()"
      [title]="fullContact()?.name || ('ADMIN.CONTACTS.DETAILS.TITLE' | translate)"
      [subtitle]="'ADMIN.ENTITIES.CONTACT' | translate"
      [allowModeToggle]="true"
      (entityChange)="onEntityChange($event)"
      initialMode="view"
    ></app-details-accordion-container>
  } @else {
    <div class="p-4">
      <p-message severity="info" [text]="'ADMIN.CONTACTS.DETAILS.EMPTY' | translate"></p-message>
    </div>
  }
}
