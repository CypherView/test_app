@if (!isInitialLoading() && !error()) {
  @if (fullExportTask()) {
    <app-details-accordion-container
      [sections]="sections()"
      [entity]="fullExportTask()"
      [title]="fullExportTask()?.name || 'Export Task Details'"
      subtitle="Export Task"
      [allowModeToggle]="true"
      (entityChange)="onEntityChange($event)"
      initialMode="view"
    ></app-details-accordion-container>
  } @else {
    <div class="p-4">
      <p-message
        severity="info"
        text="No export task details available."
      ></p-message>
    </div>
  }
}
