@if (!isInitialLoading() && !error()) {
  @if (fullMapSet()) {
    <app-details-accordion-container
      [sections]="sections()"
      [entity]="fullMapSet()"
      [title]="fullMapSet()?.name || 'Map Set Details'"
      subtitle="Map Set"
      [allowModeToggle]="true"
      (entityChange)="onEntityChange($event)"
      initialMode="view"
    ></app-details-accordion-container>
  } @else {
    <div class="p-4">
      <p-message
        severity="info"
        text="No map set details available."
      ></p-message>
    </div>
  }
}
