<div class="card pt-2">
  <div class="mb-4 p-2 flex justify-start items-center">
    <span
      class="pi pi-map-marker !text-[2.5rem]"
      [ngClass]="{ 'icon-primary': isFormEditable() }"
    ></span>

    <div class="pl-6 flex-1">
      <div class="flex justify-between items-center">
        <h2 class="text-xl font-semibold m-0">
          {{ 'ADMIN.ZONES.MAP.TITLE' | translate }}
        </h2>
        @if (!isFormEditable() && !createMode()) {
          <div class="icon-light">
            <span
              class="pi pi-pen-to-square action hover !text-2xl"
              [attr.aria-label]="'ADMIN.ZONES.MAP.ARIA.EDIT' | translate"
              (click)="onEdit()"
              (keydown.enter)="onEdit()"
            ></span>
          </div>
        }
      </div>
      <span>{{ 'ADMIN.ZONES.MAP.DESCRIPTION' | translate }}</span>
    </div>
  </div>

  <app-google-maps-zone
    [entity]="entity()!"
    [editable]="isFormEditable()"
    (onChanged)="onZoneChanged($event)"
  >
  </app-google-maps-zone>

  @if (isFormEditable()) {
    <app-dynamic-form
      [fields]="[]"
      [actions]="actions"
    >
    </app-dynamic-form>
  }
</div>
