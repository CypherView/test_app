<div class="card pt-2">
  <div class="mb-4 p-2 flex justify-start items-center">
    <span
      class="pi pi-tag !text-[2.5rem]"
      [attr.aria-label]="
        'ADMIN.ASSETS.COUNTERS.ARIA.ASSET_COUNTER_ICON'
          | translate: { icon: 'tag' }
      "
    ></span>

    <div class="pl-6 flex-1">
      <div class="flex justify-between items-center">
        <h2 class="text-xl font-semibold m-0">{{ title() }}</h2>
      </div>
      <span>{{ subTitle() }}</span>
    </div>
  </div>

  @if (warning()) {
    <div class="mb-4">
      <p-message severity="warn">
        <span class="pi pi-exclamation-triangle mr-2"></span>
        {{ warning() }}
      </p-message>
    </div>
  }

  @if (isFormEditable()) {
    <app-dynamic-form
      [fields]="formFields"
      [actions]="actions"
      (formSubmit)="onSubmit($event)"
    >
    </app-dynamic-form>
  } @else {
    <app-grid
      [data]="assetDetails()"
      [columns]="columns"
      [showGridLines]="false"
      [hideHeader]="true"
      tableStyleClass="info-display !w-auto"
    ></app-grid>
  }

  <!-- Embedded Odo/Hour Changes -->
  @if (apiSchemaService.usesModernSchema()) {
    <div class="mt-4">
      <app-asset-odo-hour-changes-section
        [entity]="entity()"
        [changeType]="odoHourChangeType()"
        [embedded]="true"
      />
    </div>
  }
</div>
