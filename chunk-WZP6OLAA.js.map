<div class="flex flex-col gap-4">
  <!-- Date Range -->
  <div class="flex flex-col gap-1">
    <span class="text-sm font-semibold">Date Range</span>
    <app-inline-date-picker
      [minDate]="minDate()"
      [hideConfirm]="true"
      (dateRangeChanged)="dateRange.set($event)"
    />
  </div>

  <!-- Divider -->
  <div class="border-t border-default"></div>

  <!-- Vehicles -->
  <div class="flex flex-col gap-1">
    <span class="text-sm font-semibold">Vehicles</span>
    <app-inline-vehicle-selector
      [vehicles]="vehicles()"
      [assetGroups]="assetGroups()"
      [costCenters]="costCenters()"
      [hideConfirm]="true"
      (selectionChanged)="onVehicleSelectionChanged($event)"
    />
  </div>

  <!-- Confirm -->
  <div
    class="flex justify-between items-center px-4 py-2 rounded-lg"
    [class.border]="canConfirm()"
    [class.border-primary]="canConfirm()"
    [class.opacity-50]="!canConfirm()"
  >
    <div class="flex gap-2 items-center text-sm">
      @if (canConfirm()) {
        <i class="pi pi-check-circle text-primary"></i>
        <span
          >{{ dateRange()?.start | date: 'mediumDate' }} &ndash;
          {{ dateRange()?.end | date: 'mediumDate' }} &bull;
          {{ selectedVehicles().length }} asset{{
            selectedVehicles().length === 1 ? '' : 's'
          }}</span
        >
      } @else {
        <i class="pi pi-info-circle"></i>
        <span>Select a date range and at least one vehicle</span>
      }
    </div>
    <button
      pButton
      icon="pi pi-check"
      size="small"
      class="!text-sm"
      [disabled]="!canConfirm()"
      (click)="onConfirm()"
    >
      <span>Confirm</span>
    </button>
  </div>
</div>
