<div class="flex flex-col gap-3">
  <!-- Date Presets -->
  <div class="flex flex-wrap gap-2">
    @for (preset of datePresets; track preset.label) {
      <button
        type="button"
        class="px-3 py-1 text-xs rounded-full hover:bg-primary hover:text-primary-contrast"
        [ngClass]="
          selectedPreset() === preset.days
            ? 'bg-primary text-primary-contrast'
            : 'bg-mainBg'
        "
        (click)="selectPreset(preset.days)"
      >
        {{ preset.label }}
      </button>
    }
  </div>

  <!-- Date Range Selectors -->
  <div class="flex flex-wrap gap-1 items-center">
    <div class="date-field">
      <span id="start-date-label" class="date-label">Start Date</span>
      <p-datepicker
        [(ngModel)]="startDate"
        [minDate]="minDate()"
        [maxDate]="endDate() || maxDate()"
        size="small"
        [showIcon]="true"
        [showTime]="true"
        hourFormat="24"
        dateFormat="M dd, yy"
        placeholder="Select start date"
        appendTo="body"
        aria-labelledby="start-date-label"
      />
    </div>

    <div class="date-separator">
      <i class="!text-xs pi pi-arrow-right" aria-hidden="true"></i>
    </div>

    <div class="date-field">
      <span id="end-date-label" class="date-label">End Date</span>
      <p-datepicker
        [(ngModel)]="endDate"
        [minDate]="startDate() || minDate()"
        [maxDate]="maxDate()"
        [showIcon]="true"
        [showTime]="true"
        hourFormat="24"
        dateFormat="M dd, yy"
        size="small"
        placeholder="Select end date"
        appendTo="body"
        aria-labelledby="end-date-label"
      />
    </div>
  </div>

  <!-- Selection Summary & Confirm -->
  @if (canConfirm() && !hideConfirm()) {
    <div
      class="flex justify-between items-center px-4 py-2 rounded-lg border border-primary"
    >
      <div class="flex gap-2 items-center text-sm">
        <i class="pi pi-calendar-plus"></i>
        <span>{{ formattedRange() }}</span>
      </div>
      <button
        pButton
        icon="pi pi-check"
        (click)="onConfirm()"
        size="small"
        class="!text-sm"
      >
        <span>Confirm</span>
      </button>
    </div>
  }
</div>
