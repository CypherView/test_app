<div
  class="flex flex-col gap-3 p-3 rounded-xl border border-surface-200 shadow-sm bg-surface-0"
>
  <!-- Zone 1: Frequency & Time -->
  <div class="flex flex-col gap-2">
    <span class="text-sm font-semibold text-surface-700"
      >Schedule frequency</span
    >

    <!-- Frequency toggle -->
    <div class="flex gap-1.5">
      @for (opt of frequencyOptions; track opt.value) {
        <button
          type="button"
          class="px-3 py-1 text-xs font-semibold rounded-full border transition-all duration-150 cursor-pointer"
          [ngClass]="
            frequency() === opt.value
              ? 'bg-primary border-primary text-white'
              : 'bg-transparent border-surface-300 text-surface-600 hover:bg-surface-50'
          "
          (click)="frequency.set(opt.value)"
        >
          {{ opt.label }}
        </button>
      }
    </div>

    <!-- Day of week (Weekly only) -->
    @if (isWeekly()) {
      <div class="flex items-center gap-2">
        <span class="text-[0.8125rem] text-surface-600 min-w-[3rem]">On:</span>
        <select
          class="flex-1 px-2 py-1.5 text-xs rounded-lg border border-surface-300 bg-surface-0 text-surface-700 cursor-pointer focus:outline-none focus:border-primary transition-colors duration-150"
          [value]="dayOfWeek()"
          (change)="onDayOfWeekChange($any($event.target).value)"
        >
          @for (day of dayOfWeekOptions; track day.value) {
            <option [value]="day.value">{{ day.label }}</option>
          }
        </select>
      </div>
    }

    <!-- Day of month (Monthly only) -->
    @if (isMonthly()) {
      <div class="flex items-center gap-2">
        <span class="text-[0.8125rem] text-surface-600 min-w-[3rem]">Day:</span>
        <input
          type="number"
          min="1"
          max="31"
          class="w-20 px-2 py-1.5 text-xs rounded-lg border border-surface-300 bg-surface-0 text-surface-700 focus:outline-none focus:border-primary transition-colors duration-150"
          [value]="dayOfMonth()"
          (input)="dayOfMonth.set(+$any($event.target).value)"
        />
      </div>
    }

    <!-- Hour / Minute -->
    <div class="flex items-center gap-2">
      <span class="text-[0.8125rem] text-surface-600 min-w-[3rem]">At:</span>
      <div class="flex items-center gap-1">
        <input
          type="number"
          min="0"
          max="23"
          class="w-14 px-2 py-1.5 text-xs rounded-lg border border-surface-300 bg-surface-0 text-surface-700 text-center focus:outline-none focus:border-primary transition-colors duration-150"
          [value]="hour()"
          (input)="hour.set(+$any($event.target).value)"
        />
        <span class="text-surface-400 font-bold">:</span>
        <input
          type="number"
          min="0"
          max="59"
          class="w-14 px-2 py-1.5 text-xs rounded-lg border border-surface-300 bg-surface-0 text-surface-700 text-center focus:outline-none focus:border-primary transition-colors duration-150"
          [value]="minute()"
          (input)="minute.set(+$any($event.target).value)"
        />
      </div>
    </div>

    <!-- Timezone -->
    <div class="flex items-center gap-2">
      <span class="text-[0.8125rem] text-surface-600 min-w-[3rem]">TZ:</span>
      <select
        class="flex-1 px-2 py-1.5 text-xs rounded-lg border border-surface-300 bg-surface-0 text-surface-700 cursor-pointer focus:outline-none focus:border-primary transition-colors duration-150"
        [value]="timezone()"
        (change)="timezone.set($any($event.target).value)"
      >
        @for (tz of timezoneOptions; track tz.value) {
          <option [value]="tz.value">{{ tz.label }}</option>
        }
      </select>
    </div>
  </div>

  <!-- Zone 2: Rolling Date Range -->
  <div class="flex flex-col gap-2 pt-2 border-t border-surface-200">
    <span class="text-[0.8125rem] font-semibold text-surface-700"
      >Data window per run</span
    >
    <div class="flex items-center gap-2">
      <span class="text-[0.8125rem] text-surface-600">Last</span>
      <input
        type="number"
        min="1"
        class="w-16 px-2 py-1.5 text-xs rounded-lg border border-surface-300 bg-surface-0 text-surface-700 text-center focus:outline-none focus:border-primary transition-colors duration-150"
        [value]="rangeValue()"
        (input)="rangeValue.set(+$any($event.target).value)"
      />
      <select
        class="flex-1 px-2 py-1.5 text-xs rounded-lg border border-surface-300 bg-surface-0 text-surface-700 cursor-pointer focus:outline-none focus:border-primary transition-colors duration-150"
        [value]="rangeUnit()"
        (change)="onRangeUnitChange($any($event.target).value)"
      >
        @for (unit of dateRangeUnitOptions; track unit.value) {
          <option [value]="unit.value">{{ unit.label }}</option>
        }
      </select>
      <span class="text-[0.8125rem] text-surface-600">of data</span>
    </div>

    <!-- Human-readable preview -->
    <div
      class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-surface-50 border border-surface-200"
    >
      <i class="pi pi-info-circle text-xs text-surface-400"></i>
      <span class="text-[0.75rem] text-surface-500 italic">{{
        humanReadableSummary()
      }}</span>
    </div>
  </div>

  <!-- Zone 3: Actions -->
  <div
    class="selection-summary flex items-center justify-between gap-3 px-3 py-2 rounded bg-primary/10 border border-primary"
  >
    <div
      class="flex items-center gap-2 text-[0.8125rem] font-medium text-primary"
    >
      <i class="pi pi-calendar-clock text-base"></i>
      <span>{{ humanReadableSummary() }}</span>
    </div>
    <div class="flex items-center gap-2">
      <button
        type="button"
        class="px-2.5 py-1 text-xs font-medium bg-transparent border border-surface-300 rounded text-surface-600 cursor-pointer hover:bg-surface-50 transition-colors duration-150"
        (click)="onCancel()"
      >
        Cancel
      </button>
      <p-button
        label="Create Schedule"
        icon="pi pi-check"
        size="small"
        styleClass="confirm-btn"
        [loading]="isLoading()"
        [disabled]="isLoading()"
        (onClick)="onConfirm()"
      />
    </div>
  </div>
</div>
