<div class="inline-data-type-selector">
  <!-- Header with Actions -->
  <div class="selector-header">
    <span class="header-label">Select data to analyze:</span>
    <div class="header-actions">
      @if (!allSelected()) {
        <button type="button" class="action-btn" (click)="selectAll()">
          Select All
        </button>
      } @else {
        <button type="button" class="action-btn" (click)="clearAll()">
          Clear All
        </button>
      }
    </div>
  </div>

  <!-- Data Type Cards -->
  <div class="data-type-grid">
    @for (type of dataTypes(); track type.id) {
      <button
        type="button"
        class="data-type-card"
        [class.selected]="isSelected(type.id)"
        (click)="toggleDataType(type)"
      >
        <div class="card-checkbox">
          <input
            type="checkbox"
            [checked]="isSelected(type.id)"
            (click)="$event.stopPropagation()"
            (change)="toggleDataType(type)"
          />
        </div>
        <i class="pi {{ type.icon }} card-icon"></i>
        <span class="card-label">{{ type.label }}</span>
        <span class="card-description">{{ type.description }}</span>
      </button>
    }
  </div>

  <!-- Selection Summary & Confirm -->
  @if (canConfirm()) {
    <div class="selection-summary">
      <div class="summary-text">
        <i class="pi pi-database"></i>
        <span
          >{{ selectedCount() }} data type{{
            selectedCount() === 1 ? '' : 's'
          }}
          selected</span
        >
      </div>
      <p-button
        label="Confirm Selection"
        icon="pi pi-check"
        (onClick)="onConfirm()"
        size="small"
        styleClass="confirm-btn"
      />
    </div>
  } @else {
    <div class="selection-summary">
      <div class="summary-text">
        <i class="pi pi-database"></i>
        <span>Select data types to analyze</span>
      </div>
      <p-button
        label="Confirm Selection"
        icon="pi pi-check"
        [disabled]="true"
        size="small"
        styleClass="confirm-btn"
      />
    </div>
  }
</div>
