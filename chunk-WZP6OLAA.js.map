<!-- Input -->
<div class="relative">
  <textarea
    #inputField
    class="p-3 sm:p-4 pb-12 sm:pb-12 block w-full rounded-lg sm:text-sm border border-primary focus:outline-none disabled:pointer-events-none resize-none [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-scrollbar-track [&::-webkit-scrollbar-thumb]:bg-scrollbar-thumb"
    [placeholder]="placeholder()"
    [disabled]="disabled() || isLoading()"
    [value]="messageText()"
    (input)="onInput($event)"
    (keydown)="onKeyDown($event)"
    rows="1"
  ></textarea>

  <!-- Toolbar -->
  <div class="absolute inset-x-px bottom-px p-2 rounded-b-lg bg-layer">
    <div class="flex flex-wrap gap-2 justify-end items-center">
      <!-- Right: Send button -->
      <div class="flex gap-x-1 items-center">
        <button
          type="button"
          class="inline-flex gap-2 justify-center items-center px-3 py-1.5 text-sm rounded-lg bg-primary border-primary-line text-primary-foreground hover:bg-primary-hover focus:z-10 focus:outline-none focus:bg-primary-focus disabled:opacity-50 disabled:pointer-events-none text-primary-contrast"
          [disabled]="disabled() || isLoading() || !messageText().trim()"
          (click)="onSend()"
          aria-label="Send message"
        >
          @if (isLoading()) {
            <i class="pi pi-spin pi-spinner"></i>
          } @else {
            <span>Send Message</span>
            <i class="pi pi-send"></i>
          }
        </button>
      </div>
    </div>
  </div>
  <!-- End Toolbar -->
</div>
