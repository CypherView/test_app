<div class="inline-report-type-selector">
  <!-- Header with Actions -->
  <div class="selector-header">
    <span class="header-label">Select report types to generate:</span>
    <div class="header-actions">
      @if (!allSelected()) {
        <button type="button" class="action-btn" (click)="selectAll()">
          Select All
        </button>
      } @else {
        <button type="button" class="action-btn" (click)="clearAll()">
          Clear All
        </button>
      }
    </div>
  </div>

  <!-- Report Type Cards -->
  <div class="report-type-grid">
    @for (type of reportTypes; track type.report_type) {
      <button
        type="button"
        class="report-type-card"
        [class.selected]="isSelected(type.report_type)"
        (click)="toggleType(type.report_type)"
      >
        <div class="card-checkbox">
          <input
            type="checkbox"
            [checked]="isSelected(type.report_type)"
            (click)="$event.stopPropagation()"
            (change)="toggleType(type.report_type)"
          />
        </div>
        <i class="pi {{ type.icon }} card-icon"></i>
        <span class="card-label">{{ type.display_name }}</span>
        <span class="card-description">{{ type.description }}</span>
      </button>
    }
  </div>

  <!-- Selection Summary & Confirm -->
  <div class="selection-summary">
    <div class="summary-text">
      <i class="pi pi-file-excel"></i>
      @if (canConfirm()) {
        <span
          >{{ selectedCount() }} report type{{
            selectedCount() === 1 ? '' : 's'
          }}
          selected</span
        >
      } @else {
        <span>Select report types to generate</span>
      }
    </div>
    <p-button
      label="Continue"
      icon="pi pi-arrow-right"
      iconPos="right"
      [disabled]="!canConfirm()"
      (onClick)="onConfirm()"
      size="small"
      styleClass="confirm-btn"
    />
  </div>
</div>
